name: ETF Realtime Data Collector & Dashboard Builder

on:
  schedule:
    # 5분 간격 크론 스케줄 실행
    - cron: '*/5 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas

      - name: Run ETF Data Collection Script
        run: |
          python src/fetch_etf.py

      - name: Commit and push updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update ETF dataset via GitHub Actions"
          file_pattern: 'data/*.json data/*.csv'
